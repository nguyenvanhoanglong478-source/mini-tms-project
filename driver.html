<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài xế - TMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 650px; margin: 30px auto;">
        <h2>📍 Thông tin Chuyến đi & Đơn hàng</h2>
        
        <div class="form-group">
            <label>Mã xe (Biển số):</label>
            <input type="text" id="vehicleId" placeholder="VD: 51H-12345" required>
        </div>
        <div class="form-group">
            <label>Tên Tài xế:</label>
            <input type="text" id="driverName" placeholder="Nhập tên tài xế" required>
        </div>

        <div class="form-group">
            <label>Điểm đi (Nơi nhận hàng):</label>
            <input type="text" id="startLocation" placeholder="VD: Kho Bình Dương" required>
        </div>
        <div class="form-group">
            <label>Điểm đến (Nơi giao hàng):</label>
            <input type="text" id="endLocation" placeholder="VD: Quận 7, TP.HCM" required>
        </div>
        <div class="form-group">
            <label>Tên khách hàng:</label>
            <input type="text" id="customerName" placeholder="VD: Công ty TNHH ABC" required>
        </div>
        <div class="form-group">
            <label>Loại hàng giao:</label>
            <select id="cargoType">
                <option value="Hàng điện tử">Hàng điện tử</option>
                <option value="Thực phẩm">Thực phẩm</option>
                <option value="Hàng dễ vỡ">Hàng dễ vỡ</option>
                <option value="Khác">Khác</option>
            </select>
        </div>
        <div class="form-group">
            <label>Thời gian giao dự kiến:</label>
            <input type="datetime-local" id="deliveryTime" required>
        </div>
        <div class="form-group">
            <label>Phí phụ thu (Nếu có) - VNĐ:</label>
            <input type="number" id="surcharge" placeholder="VD: 50000 (Để trống nếu không có)">
        </div>
        <div class="form-group">
            <label>Trạng thái vận chuyển:</label>
            <select id="vehicleStatus">
                <option value="Đang giao hàng">Đang giao hàng</option>
                <option value="Tạm dừng">Tạm dừng (Nghỉ/Đổ xăng)</option>
                <option value="Đã giao xong">Đã giao xong</option>
            </select>
        </div>
        
        <div class="buttons">
            <button id="btnStart" class="btn btn-primary">Bắt đầu chuyến đi</button>
            <button id="btnStop" class="btn btn-danger" disabled>Kết thúc</button>
        </div>

        <p id="status-message">Trạng thái: Chưa bật GPS</p>
    </div>

    <script type="module" src="driver.js"></script>
</body>
</html>
